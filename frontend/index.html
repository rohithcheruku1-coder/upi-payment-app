<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0">

  <title>UPI Payment</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="container">

    <h2>UPI Payment</h2>

    <input
      type="text"
      id="name"
      placeholder="Enter Name"
    >

    <input
      type="number"
      id="amount"
      placeholder="Enter Amount"
    >

    <button onclick="generateQR()">
      Generate QR
    </button>

    <div id="qr-container">

      <img id="qrImage">

    </div>

    <button
      id="phonepeBtn"
      onclick="openPhonePe()"
      style="display:none;"
    >

      Open in PhonePe

    </button>

  </div>

  <script src="script.js"></script>

</body>

</html>
